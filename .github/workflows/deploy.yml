name: Deploy viz to GitHub Pages

# Builds the Vite app in viz/ and publishes it to GitHub Pages.
on:
  push:
    branches: [main]
    # Only rebuild when the app (or this workflow) changes — doc-only edits skip it.
    paths:
      - 'viz/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: # allow manual runs from the Actions tab

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel an in-progress run if a newer push lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viz
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: viz/package-lock.json

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          # Path is relative to the repo root, not the working-directory.
          path: viz/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
